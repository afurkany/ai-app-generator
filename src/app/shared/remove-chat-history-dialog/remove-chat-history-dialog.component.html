<h2 mat-dialog-title>Delete file</h2>
<mat-dialog-content>
  Would you like to delete chat history?
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onClickNo()">No</button>
  <button mat-button cdkFocusInitial (click)="onClickYes()">Yes</button>
</mat-dialog-actions>
