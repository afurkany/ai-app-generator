<h2 mat-dialog-title>Settings</h2>
<mat-dialog-content>
  <mat-form-field>
		<mat-label>Select language</mat-label>
		<mat-select>
			<mat-option value="one">English</mat-option>
			<mat-option value="two">Türkçe</mat-option>
		</mat-select>
	</mat-form-field>
  <p><mat-slide-toggle labelPosition="before">Dark mode</mat-slide-toggle></p>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-button mat-dialog-close>Save</button>
</mat-dialog-actions>
